# ⚠️ teamwork 本地敏感配置 · 绝不提交 git
# 本文件所在目录 .teamwork-local-env/ 已被双重 gitignore(项目根 .gitignore + 本目录内 .gitignore)。
# teamwork session 初始化(bootstrap)在此目录缺失时自动创建本模板 · 已存在则不覆盖。
#
# 用途:集中放置「本机/本人」敏感配置 —— 不进仓库、不进 feature 产物、不进归档 zip。
#   · 键值型 secret(数据库密码 / 个人 API key / token)→ 写进本文件(KEY=value)
#   · 整文件型 secret(kubeconfig / *.pem 证书 / service-account.json)→ 直接作为文件放到
#     .teamwork-local-env/ 目录下(如 .teamwork-local-env/kubeconfig)
#
# 读取约定:见项目 TROUBLESHOOTING.md(teamwork 不假设技术栈 · 具体加载命令由项目维护)。
# 格式:KEY=value(每行一条 · # 注释 · 值含空格再加引号)· 同时兼容 shell `source` 与 .properties。
#
# ── 示例(取消注释 + 填真实值)──────────────────────────────
# DB_HOST=localhost
# DB_PORT=5432
# DB_USER=
# DB_PASSWORD=
# REDIS_URL=
# OPENAI_API_KEY=
# ANTHROPIC_API_KEY=
#
# 整文件示例:
#   把 kubeconfig 放到 .teamwork-local-env/kubeconfig · 用时:
#   KUBECONFIG=.teamwork-local-env/kubeconfig kubectl get pods
